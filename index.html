<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>RDH SLOT MACHINE – Match the Defect!</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #1f2a38, #0f1720);
      color: white;
      text-align: center;
    }

    h1 {
      margin-top: 20px;
      font-size: 2rem;
    }

    .machine {
      display: flex;
      justify-content: center;
      margin-top: 30px;
      gap: 15px;
      flex-wrap: wrap;
    }

    /* Reel window */
    .reel {
      flex: 1 1 30%;
      max-width: 160px;
      aspect-ratio: 1 / 1;
      background: white;
      border-radius: 12px;
      overflow: hidden;
      position: relative;
      box-shadow: 0 10px 25px rgba(0,0,0,0.35);
      min-width: 100px;
      min-height: 100px;
    }

    .reel-track {
      position: absolute;
      width: 100%;
      left: 0;
      top: 0;
      transform: translateY(0);
      transition: transform 1s cubic-bezier(.17,.67,.83,.67);
    }

    .reel-track img {
      width: 100%;
      height: 100%;
      display: block;
      margin: 0;
      object-fit: contain;
      background: white;
    }

    .spin-button {
      margin-top: 30px;
      padding: 15px 30px;
      font-size: 1.2rem;
      border-radius: 10px;
      border: none;
      background-color: #00b894;
      color: white;
      cursor: pointer;
    }

    .spin-button:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    .message {
      margin-top: 25px;
      font-size: 1.2rem;
      min-height: 50px;
      padding: 0 12px;
    }
  </style>
</head>

<body>
  <h1>🎰 RDH SLOT MACHINE</h1>

  <div class="machine">
    <div class="reel" id="reel1"></div>
    <div class="reel" id="reel2"></div>
    <div class="reel" id="reel3"></div>
  </div>

  <button class="spin-button" id="spinBtn" type="button">SPIN</button>

  <audio id="spinSound" src="spin.mp3" preload="auto"></audio>
  <audio id="winSound" src="win.mp3" preload="auto"></audio>
  <audio id="jackpotSound" src="jackpot.mp3" preload="auto"></audio>

  <div class="message" id="message"></div>

  <script>
    document.addEventListener("DOMContentLoaded", () => {
      const symbols = [
        { name: "water", weight: 5 },
        { name: "cracks", weight: 5 },
        { name: "roof", weight: 5 },
        { name: "air", weight: 5 },
        { name: "structural", weight: 5 },
        { name: "healthy", weight: 1 }
      ];

      // Preload images
      symbols.forEach(s => {
        const img = new Image();
        img.src = s.name + '.png';
      });

      const spinSound = document.getElementById("spinSound");
      const winSound = document.getElementById("winSound");
      const jackpotSound = document.getElementById("jackpotSound");
      const button = document.getElementById("spinBtn");
      const messageEl = document.getElementById("message");

      messageEl.innerText = "Ready! Press SPIN 🎰";

      function safePlay(audioEl) {
        if (!audioEl) return;
        try {
          audioEl.currentTime = 0;
          const p = audioEl.play();
          if (p && typeof p.catch === "function") p.catch(() => {});
        } catch (e) {}
      }

      function weightedRandom() {
        const pool = [];
        for (const s of symbols) {
          for (let i = 0; i < s.weight; i++) pool.push(s.name);
        }
        return pool[Math.floor(Math.random() * pool.length)];
      }

      function setReel(reelId, finalSymbol, spins = 12) {
        const reel = document.getElementById(reelId);
        let stack = "";
        for (let i = 0; i < spins; i++) {
          stack += `<img src="${weightedRandom()}.png" alt="">`;
        }
        stack += `<img src="${finalSymbol}.png" alt="">`;
        reel.innerHTML = `<div class="reel-track">${stack}</div>`;
        const track = reel.querySelector(".reel-track");

        track.style.transition = "none";
        track.style.transform = "translateY(0)";
        track.offsetHeight; // force reflow
        track.style.transition = "transform 1s cubic-bezier(.17,.67,.83,.67)";
        return track;
      }

      function stopReel(track) {
        const images = track.querySelectorAll("img");
        const reelHeight = track.parentElement.offsetHeight;
        const totalHeight = images.length * reelHeight;
        const finalPosition = totalHeight - reelHeight;
        track.style.transform = `translateY(-${finalPosition}px)`;
      }

      function evaluate([r1, r2, r3]) {
        if (r1 === r2 && r2 === r3) {
          safePlay(jackpotSound);
          messageEl.innerText = "💎 JACKPOT! All three match!";
          return;
        }
        if (r1 === r2 || r1 === r3 || r2 === r3) {
          safePlay(winSound);
          messageEl.innerText = "🎉 Match 2! You win!";
          return;
        }
        messageEl.innerText = "❌ No match — try again!";
      }

      function spin() {
        button.disabled = true;
        messageEl.innerText = "";
        safePlay(spinSound);

        const finalSymbols = [weightedRandom(), weightedRandom(), weightedRandom()];

        const track1 = setReel("reel1", finalSymbols[0], 12);
        const track2 = setReel("reel2", finalSymbols[1], 16);
        const track3 = setReel("reel3", finalSymbols[2], 20);

        setTimeout(() => stopReel(track1), 150);
        setTimeout(() => stopReel(track2), 650);
        setTimeout(() => stopReel(track3), 1150);

        setTimeout(() => {
          evaluate(finalSymbols);
          button.disabled = false;
        }, 1750);
      }

      button.addEventListener("click", spin);

      (function init() {
        const s1 = weightedRandom();
        const s2 = weightedRandom();
        const s3 = weightedRandom();

        document.getElementById("reel1").innerHTML =
          `<div class="reel-track"><img src="${s1}.png"></div>`;
        document.getElementById("reel2").innerHTML =
          `<div class="reel-track"><img src="${s2}.png"></div>`;
        document.getElementById("reel3").innerHTML =
          `<div class="reel-track"><img src="${s3}.png"></div>`;
      })();

      document.addEventListener("keydown", (e) => {
        if (e.code === "Space" && !button.disabled) {
          e.preventDefault();
          spin();
        }
      });
    });
  </script>
</body>
</html>
