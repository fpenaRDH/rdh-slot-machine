<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>RDH SLOT MACHINE – Match the Defect!</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
body { 
  margin:0; 
  font-family:Arial,sans-serif; 
  background:linear-gradient(135deg,#1f2a38,#0f1720); 
  color:white; 
  text-align:center; 
}
h1 {
  margin-top:20px;
  font-size:28px;
}
.machine {
  display:flex; 
  justify-content:center; 
  margin-top:30px; 
  gap:15px;
}
.reel {
  width:22vw;
  height:22vw;
  max-width:160px;
  max-height:160px;
  background:white;
  border-radius:12px;
  overflow:hidden;
  position:relative;
}
.reel-track {
  position:absolute;
  width:100%;
  transition:transform 1s cubic-bezier(.17,.67,.83,.67);
}
.reel-track img {
  width:70%; 
  height:70%; 
  display:block; 
  margin:15% auto; 
  object-fit:contain;
}
.spin-button {
  margin-top:30px;
  padding:15px 30px; 
  font-size:20px; 
  border-radius:10px; 
  border:none; 
  background-color:#00b894;
  color:white;
}
.message {
  margin-top:25px;
  font-size:20px;
  min-height:50px;
}
.spin-button:disabled {opacity:0.6;}
</style>
</head>
<body>

<h1>🎰 RDH SLOT MACHINE</h1>

<div class="machine">
  <div class="reel" id="reel1"></div>
  <div class="reel" id="reel2"></div>
  <div class="reel" id="reel3"></div>
</div>

<button class="spin-button" onclick="spin()">SPIN</button>

<audio id="spinSound" src="spin.mp3"></audio>
<audio id="winSound" src="win.mp3"></audio>
<audio id="jackpotSound" src="jackpot.mp3"></audio>

<div class="message" id="message"></div>

<script>
const symbols = [
  { name: "water", weight: 5 },
  { name: "cracks", weight: 5 },
  { name: "roof", weight: 5 },
  { name: "air", weight: 5 },
  { name: "structural", weight: 5 },
  { name: "healthy", weight: 1 }
];

const spinSound = document.getElementById("spinSound");
const winSound = document.getElementById("winSound");
const jackpotSound = document.getElementById("jackpotSound");
const button = document.querySelector(".spin-button");

function weightedRandom() {
  let pool = [];
  symbols.forEach(s => { 
    for(let i=0;i<s.weight;i++) pool.push(s.name); 
  });
  return pool[Math.floor(Math.random() * pool.length)];
}

function setReel(id, finalSymbol) {
  const reel = document.getElementById(id);
  let stack = '';
  for(let i=0;i<10;i++) stack += `<img src="${weightedRandom()}.png">`;
  stack += `<img src="${finalSymbol}.png">`;
  reel.innerHTML = `<div class="reel-track">${stack}</div>`;
  const track = reel.querySelector('.reel-track');
  track.offsetHeight; // force reflow
  return track;
}

function stopReel(track) {
  const images = track.querySelectorAll('img');
  const lastImage = images[images.length-1];
  const reelHeight = track.parentElement.offsetHeight;
  const imageHeight = lastImage.offsetHeight;
  const imagesAbove = images.length-1;
  const moveAmount = imagesAbove * imageHeight - (reelHeight - imageHeight)/2;
  track.style.transform = `translateY(-${moveAmount}px)`;
}

function spin() {
  button.disabled = true;
  document.getElementById("message").innerText = "";
  spinSound.currentTime = 0; 
  spinSound.play();

  const finalSymbols = [weightedRandom(), weightedRandom(), weightedRandom()];
  const track1 = setReel("reel1", finalSymbols[0]);
  const track2 = setReel("reel2", finalSymbols[1]);
  const track3 = setReel("reel3", finalSymbols[2]);

  setTimeout(()=>stopReel(track1), 200);
  setTimeout(()=>stopReel(track2), 800);
  setTimeout(()=>stopReel(track3), 1400);

  setTimeout(()=>{
    evaluate(finalSymbols);
    button.disabled = false;
  },2000);
}

function evaluate([r1, r2, r3]) {
  const message = document.getElementById("message");

  // Jackpot: all three match
  if (r1 === r2 && r2 === r3) {
    jackpotSound.currentTime = 0; 
    jackpotSound.play();
    message.innerText = "💎 JACKPOT! All three match!";
    return;
  }

  // Two-match: exactly two symbols match
  if (r1 === r2 || r1 === r3 || r2 === r3) {
    winSound.currentTime = 0; 
    winSound.play();
    message.innerText = "🎉 Match 2! You win!";
    return;
  }

  // No match
  message.innerText = "❌ No match — try again!";
}
</script>

</body>
</html>
