<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>RDH SLOT MACHINE – Match the Defect!</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
  body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg, #1f2a38, #0f1720);
    color: white;
    text-align: center;
  }

  h1 {
    margin-top: 20px;
    font-size: 28px;
  }

  .machine {
    display: flex;
    justify-content: center;
    margin-top: 30px;
    gap: 15px;
  }

  .reel {
    width: 120px;
    height: 120px;
    background: white;
    border-radius: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .reel img {
    width: 90px;
    height: 90px;
    object-fit: contain;
  }

  .spin-button {
    margin-top: 30px;
    padding: 15px 30px;
    font-size: 20px;
    border-radius: 10px;
    border: none;
    background-color: #00b894;
    color: white;
  }

  .message {
    margin-top: 25px;
    font-size: 20px;
    min-height: 50px;
  }

    .spinning {
  animation: spinAnim 0.15s linear infinite;
}

@keyframes spinAnim {
  0% { transform: translateY(0); }
  100% { transform: translateY(-15px); }
}

.spin-button:disabled {
  opacity: 0.6;
}
</style>
</head>
<body>

<h1>🎰 RDH SLOT MACHINE</h1>

<div class="machine">
  <div class="reel" id="reel1"></div>
  <div class="reel" id="reel2"></div>
  <div class="reel" id="reel3"></div>
</div>

<button class="spin-button" onclick="spin()">SPIN</button>
<audio id="spinSound" src="spin.mp3"></audio>
<audio id="winSound" src="win.mp3"></audio>
<audio id="jackpotSound" src="jackpot.mp3"></audio>
    
<div class="message" id="message"></div>

<script>
const symbols = [
  { name: "water", weight: 5 },
  { name: "cracks", weight: 5 },
  { name: "roof", weight: 5 },
  { name: "air", weight: 5 },
  { name: "structural", weight: 5 },
  { name: "healthy", weight: 1 }
];

const spinSound = document.getElementById("spinSound");
const winSound = document.getElementById("winSound");
const jackpotSound = document.getElementById("jackpotSound");
const button = document.querySelector(".spin-button");

function weightedRandom() {
  let pool = [];
  symbols.forEach(s => {
    for (let i = 0; i < s.weight; i++) {
      pool.push(s.name);
    }
  });
  return pool[Math.floor(Math.random() * pool.length)];
}

function setReel(id, symbol) {
  document.getElementById(id).innerHTML =
    `<img src="${symbol}.png">`;
}

function spin() {

  button.disabled = true;
  document.getElementById("message").innerText = "";

  spinSound.currentTime = 0;
  spinSound.play();

  const reel1 = document.getElementById("reel1");
  const reel2 = document.getElementById("reel2");
  const reel3 = document.getElementById("reel3");

  reel1.classList.add("spinning");
  reel2.classList.add("spinning");
  reel3.classList.add("spinning");

  let r1, r2, r3;

  // Reel 1 stops
  setTimeout(() => {
    reel1.classList.remove("spinning");
    r1 = weightedRandom();
    setReel("reel1", r1);
  }, 1000);

  // Reel 2 stops
  setTimeout(() => {
    reel2.classList.remove("spinning");
    r2 = weightedRandom();
    setReel("reel2", r2);
  }, 2000);

  // Reel 3 stops
  setTimeout(() => {
    reel3.classList.remove("spinning");
    r3 = weightedRandom();
    setReel("reel3", r3);

    evaluate(r1, r2, r3);
    button.disabled = false;

  }, 3000);
}

function evaluate(r1, r2, r3) {
  const message = document.getElementById("message");

  if (r1 === r2 && r2 === r3) {

    jackpotSound.currentTime = 0;
    jackpotSound.play();

    if (r1 === "healthy") {
      message.innerText = "💎 HEALTHY BUILDING JACKPOT!";
    } else {
      message.innerText = "🏆 Triple Defect! Grand Prize Entry!";
    }
    return;
  }

  if (r1 === r2 || r2 === r3 || r1 === r3) {
    winSound.currentTime = 0;
    winSound.play();
    message.innerText = "🎉 Match 2! Claim your RDH swag!";
    return;
  }

  message.innerText = "No match — try again!";
}
</script>

</body>
</html>
