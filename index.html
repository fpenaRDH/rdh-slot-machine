<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>RDH SLOT MACHINE – Match the Defect!</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
  body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg, #1f2a38, #0f1720);
    color: white;
    text-align: center;
  }

  h1 {
    margin-top: 20px;
    font-size: 28px;
  }

  .machine {
    display: flex;
    justify-content: center;
    margin-top: 30px;
    gap: 15px;
  }

 .reel {
  width: 120px;
  height: 120px;
  background: white;
  border-radius: 12px;
  overflow: hidden;
  position: relative;
}

.reel-track {
  position: absolute;
  width: 100%;
}

.reel-track img {
  width: 90px;
  height: 90px;
  display: block;
  margin: 15px auto;
  object-fit: contain;
}

.spin-button {
  margin-top: 30px;
  padding: 15px 30px;
  font-size: 20px;
  border-radius: 10px;
  border: none;
  background-color: #00b894;
  color: white;
 }

.message {
  margin-top: 25px;
  font-size: 20px;
  min-height: 50px;
}

.spinning {
  animation: spinScroll 0.2s linear infinite;
}

@keyframes spinScroll {
  0%   { transform: translateY(0); }
  100% { transform: translateY(-120px); }
}

.spin-button:disabled {
  opacity: 0.6;
}
</style>
</head>
<body>

<h1>🎰 RDH SLOT MACHINE</h1>

<div class="machine">
  <div class="reel" id="reel1"></div>
  <div class="reel" id="reel2"></div>
  <div class="reel" id="reel3"></div>
</div>

<button class="spin-button" onclick="spin()">SPIN</button>
<audio id="spinSound" src="spin.mp3"></audio>
<audio id="winSound" src="win.mp3"></audio>
<audio id="jackpotSound" src="jackpot.mp3"></audio>
    
<div class="message" id="message"></div>

<script>
const symbols = [
  { name: "water", weight: 5 },
  { name: "cracks", weight: 5 },
  { name: "roof", weight: 5 },
  { name: "air", weight: 5 },
  { name: "structural", weight: 5 },
  { name: "healthy", weight: 1 }
];

const spinSound = document.getElementById("spinSound");
const winSound = document.getElementById("winSound");
const jackpotSound = document.getElementById("jackpotSound");
const button = document.querySelector(".spin-button");

function weightedRandom() {
  let pool = [];
  symbols.forEach(s => {
    for (let i = 0; i < s.weight; i++) {
      pool.push(s.name);
    }
  });
  return pool[Math.floor(Math.random() * pool.length)];
}

function setReel(id, finalSymbol) {

  const reel = document.getElementById(id);

  // Build a stack of random images for spin effect
  let stack = "";
  for (let i = 0; i < 10; i++) {
    let random = weightedRandom();
    stack += `<img src="${random}.png">`;
  }

  // Add the final symbol at the end
  stack += `<img src="${finalSymbol}.png">`;

  reel.innerHTML = `<div class="reel-track spinning">${stack}</div>`;

  return reel.querySelector(".reel-track");
}

function spin() {

  button.disabled = true;
  document.getElementById("message").innerText = "";

  spinSound.currentTime = 0;
  spinSound.play();

  let r1 = weightedRandom();
  let r2 = weightedRandom();
  let r3 = weightedRandom();

  const track1 = setReel("reel1", r1);
  const track2 = setReel("reel2", r2);
  const track3 = setReel("reel3", r3);

  // Stop Reel 1
  setTimeout(() => {
    track1.classList.remove("spinning");
  }, 1000);

  // Stop Reel 2
  setTimeout(() => {
    track2.classList.remove("spinning");
  }, 2000);

  // Stop Reel 3
  setTimeout(() => {
    track3.classList.remove("spinning");
    evaluate(r1, r2, r3);
    button.disabled = false;
  }, 3000);
}

function evaluate(r1, r2, r3) {
  const message = document.getElementById("message");

  if (r1 === r2 && r2 === r3) {

    jackpotSound.currentTime = 0;
    jackpotSound.play();

    if (r1 === "healthy") {
      message.innerText = "💎 HEALTHY BUILDING JACKPOT!";
    } else {
      message.innerText = "🏆 Triple Defect! Grand Prize Entry!";
    }
    return;
  }

  if (r1 === r2 || r2 === r3 || r1 === r3) {
    winSound.currentTime = 0;
    winSound.play();
    message.innerText = "🎉 Match 2! Claim your RDH swag!";
    return;
  }

  message.innerText = "No match — try again!";
}
</script>

</body>
</html>
